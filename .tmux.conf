set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'rose-pine/tmux'

set -g status-position top
set -g renumber-windows on

# window と pane を 1 から始める
set -g base-index 1
setw -g pane-base-index 1

# Prefix-c Prefix-" Prefix-% でカレントディレクトリを使う
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# copy-mode に入るときのキーバインドを vi のようにする有名な設定
# https://eiji.page/blog/tmux-conf-copy-mode/
# これとは別に、copy-mode の中での挙動は `tmux show -g mode-keys` で確認できる
unbind -T copy-mode-vi Space
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# https://github.com/rose-pine/tmux
set -g @rose_pine_variant "main"
set -g @rose_pine_status_left_append_section " "
set -g @rose_pine_date_time "%H:%M"
set -g @rose_pine_directory "on"
set -g @rose_pine_disable_active_window_menu "on"

# ghq+fzf+tmux
# TODO: `bind -n C-g choose-session` にしたほうが汎用性が高い
bind -n C-g run-shell "$HOME/.zsh/bin/dev"

# https://formulae.brew.sh/formula/tpm
run "$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm"

